<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#FFFFFF" />
  <title>Group Dashboard — Daily Activity Monitor</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <div class="nav-brand"><a href="home.html">Daily Activity Monitor</a></div>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav-links" id="navLinks">
        <a href="group-dashboard.html" class="nav-link nav-link--active">Group Dashboard</a>
        <a href="personal-dashboard.html" class="nav-link">My Dashboard</a>
        <a href="contact.html" class="nav-link">Contact Us</a>
        <div class="nav-session">
          <!-- rendered by session.js -->
        </div>
      </nav>
    </div>
  </header>

  <main class="page-main">

    <div class="page-header">
      <h1 class="page-title">Group Dashboard</h1>
      <p class="page-subtitle" id="groupSubtitle">All groups you belong to or have created.</p>
    </div>

    <div style="display:flex; justify-content:flex-end; margin-bottom:1.25rem; gap:0.75rem;">
      <a href="create-group.html" class="btn btn--primary" style="font-size:0.9rem; padding:0.55rem 1.25rem;">
        ➕ Create Group
      </a>
      <a href="join-group.html" class="btn btn--outline" style="font-size:0.9rem; padding:0.55rem 1.25rem;">
        🤝 Join Group
      </a>
    </div>

    <div class="groups-grid" id="groupsGrid">
      <!-- Populated by JS -->
    </div>

  </main>

  <footer class="footer">
    <p>&copy; 2026 Daily Activity Monitor. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-config.js"></script>
  <script src="session.js"></script>
  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {

      var user   = DAMSession.getUser();
      var grid   = document.getElementById('groupsGrid');
      var subtitle = document.getElementById('groupSubtitle');

      if (!user) return; // session.js handles redirect

      // Load all groups
      var allGroups = [];
      try { allGroups = JSON.parse(localStorage.getItem('dam_groups') || '[]'); }
      catch (e) { allGroups = []; }

      // Filter to groups this user created OR is listed as a member in
      var userEmail = user.email.toLowerCase();
      var myGroups  = allGroups.filter(function (g) {
        if (g.admin && g.admin.toLowerCase() === (user.firstName + ' ' + user.lastName).toLowerCase()) return true;
        if (g.members && g.members.some(function (m) {
          return m.email && m.email.toLowerCase() === userEmail;
        })) return true;
        return false;
      });

      subtitle.textContent = myGroups.length > 0
        ? 'You are part of ' + myGroups.length + ' group' + (myGroups.length > 1 ? 's' : '') + '.'
        : 'You have not joined or created any groups yet.';

      if (myGroups.length === 0) {
        grid.innerHTML = [
          '<div class="group-card-empty">',
            '<div class="group-card-empty-icon">📭</div>',
            '<p>No groups yet.</p>',
            '<p style="font-size:0.85rem; margin-top:0.4rem; color:var(--color-ink-light);">',
              'Create a new group or join one using an invite code.',
            '</p>',
          '</div>'
        ].join('');
        return;
      }

      // Render group cards
      grid.innerHTML = myGroups.map(function (g) {
        var isAdmin = g.admin &&
          g.admin.toLowerCase() === (user.firstName + ' ' + user.lastName).toLowerCase();
        var memberCount = (g.members || []).length;
        var created = g.createdAt
          ? new Date(g.createdAt).toLocaleDateString('en-CA', { year:'numeric', month:'short', day:'numeric' })
          : '';

        return [
          '<div class="group-card">',
            '<div class="group-card-header">',
              '<div class="group-card-name">' + escHtml(g.name) + '</div>',
              '<span class="group-card-badge ' + (isAdmin ? 'group-card-badge--admin' : 'group-card-badge--member') + '">',
                isAdmin ? '★ Admin' : 'Member',
              '</span>',
            '</div>',
            '<div class="group-card-meta">Created ' + (created || 'recently') + '</div>',
            '<div class="group-card-members">',
              '👥 ' + memberCount + ' member' + (memberCount !== 1 ? 's' : ''),
            '</div>',
          '</div>'
        ].join('');
      }).join('');

      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
    });
  </script>
</body>
</html>
