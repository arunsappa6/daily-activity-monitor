<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#FFFFFF" />
  <title>My Dashboard — Daily Activity Monitor</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    .profile-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 1.5rem;
      align-items: center;
      margin-bottom: 2rem;
    }

    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--color-accent);
      color: #fff;
      font-family: var(--font-heading);
      font-size: 1.75rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .profile-name {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--color-ink);
      margin-bottom: 0.25rem;
    }

    .profile-email {
      font-size: 0.88rem;
      color: var(--color-ink-muted);
    }

    .profile-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 99px;
      margin-top: 0.4rem;
      background: #D5F5E3;
      color: #1E8449;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .info-tile {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1.25rem 1.5rem;
    }

    .info-tile-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-ink-light);
      margin-bottom: 0.35rem;
    }

    .info-tile-value {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--color-ink);
      word-break: break-word;
    }

    .coming-soon-box {
      background: var(--color-surface-2);
      border: 1.5px dashed var(--color-border);
      border-radius: var(--radius-md);
      padding: 2.5rem;
      text-align: center;
      color: var(--color-ink-muted);
      font-size: 0.92rem;
    }

    .coming-soon-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

    @media (max-width: 640px) {
      .profile-card  { grid-template-columns: 1fr; text-align: center; }
      .profile-avatar { margin: 0 auto; }
      .info-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="navbar" id="navbar">
    <div class="navbar-inner">
      <div class="nav-brand"><a href="home.html">Daily Activity Monitor</a></div>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav-links" id="navLinks">
        <a href="group-dashboard.html" class="nav-link">Group Dashboard</a>
        <a href="personal-dashboard.html" class="nav-link nav-link--active">My Dashboard</a>
        <a href="contact.html" class="nav-link">Contact Us</a>
        <div class="nav-session">
          <!-- Rendered by session.js -->
        </div>
      </nav>
    </div>
  </header>

  <main class="page-main">

    <div class="page-header">
      <h1 class="page-title">My Dashboard</h1>
      <p class="page-subtitle">Your profile and personal activity overview.</p>
    </div>

    <!-- Profile card -->
    <div class="profile-card" id="profileCard">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div>
        <div class="profile-name"  id="profileName">—</div>
        <div class="profile-email" id="profileEmail">—</div>
        <span class="profile-badge" id="profileBadge">Verified ✓</span>
      </div>
    </div>

    <!-- Account info tiles -->
    <div class="info-grid" id="infoGrid">
      <!-- Populated by JS -->
    </div>

    <!-- Calendar placeholder -->
    <div class="coming-soon-box">
      <div class="coming-soon-icon">📅</div>
      <p><strong>Personal Schedule Calendar</strong></p>
      <p style="margin-top:0.4rem; font-size:0.85rem; color:var(--color-ink-light);">
        Your personal activity calendar will appear here in a future update.
      </p>
    </div>

  </main>

  <footer class="footer">
    <p>&copy; 2026 Daily Activity Monitor. All rights reserved.</p>
  </footer>

  <script src="session.js"></script>
  <script src="main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {

      var user = DAMSession.getUser();
      if (!user) return; // session.js handles redirect

      // Avatar initials
      var initials = (user.firstName.charAt(0) + user.lastName.charAt(0)).toUpperCase();
      document.getElementById('profileAvatar').textContent = initials;
      document.getElementById('profileName').textContent   = user.firstName + ' ' + user.lastName;
      document.getElementById('profileEmail').textContent  = user.email;

      // Admin badge
      if (user.isAdmin) {
        document.getElementById('profileBadge').textContent = 'Admin ★';
        document.getElementById('profileBadge').style.background = '#D5F5E3';
      }

      // Groups count
      var allGroups = [];
      try { allGroups = JSON.parse(localStorage.getItem('dam_groups') || '[]'); }
      catch (e) {}

      var userFullName = (user.firstName + ' ' + user.lastName).toLowerCase();
      var myGroupCount = allGroups.filter(function (g) {
        if (g.admin && g.admin.toLowerCase() === userFullName) return true;
        if (g.members && g.members.some(function (m) {
          return m.email && m.email.toLowerCase() === user.email.toLowerCase();
        })) return true;
        return false;
      }).length;

      // Format DOB nicely
      var dobDisplay = '—';
      if (user.dob) {
        try {
          var parts = user.dob.split('-');
          var d = new Date(parts[0], parts[1] - 1, parts[2]);
          dobDisplay = d.toLocaleDateString('en-CA', { year:'numeric', month:'long', day:'numeric' });
        } catch (e) { dobDisplay = user.dob; }
      }

      // Address
      var addressParts = [];
      if (user.aptUnit)      addressParts.push(user.aptUnit);
      if (user.streetNumber) addressParts.push(user.streetNumber);
      if (user.streetName)   addressParts.push(user.streetName);
      if (user.province)     addressParts.push(user.province.split('—')[1] || user.province);
      if (user.country)      addressParts.push(user.country);
      if (user.postalCode)   addressParts.push(user.postalCode);
      var addressDisplay = addressParts.join(', ') || '—';

      // Registered date
      var regDisplay = '—';
      if (user.registeredAt) {
        try {
          regDisplay = new Date(user.registeredAt).toLocaleDateString('en-CA', {
            year:'numeric', month:'long', day:'numeric'
          });
        } catch (e) {}
      }

      var tiles = [
        { label: 'Date of Birth',    value: dobDisplay },
        { label: 'Phone Number',     value: user.phone ? ('+' + user.phone) : '—' },
        { label: 'Address',          value: addressDisplay },
        { label: 'Country',          value: user.country || '—' },
        { label: 'Member Since',     value: regDisplay },
        { label: 'Groups',           value: myGroupCount + ' group' + (myGroupCount !== 1 ? 's' : '') }
      ];

      document.getElementById('infoGrid').innerHTML = tiles.map(function (t) {
        return [
          '<div class="info-tile">',
            '<div class="info-tile-label">' + t.label + '</div>',
            '<div class="info-tile-value">' + escHtml(String(t.value)) + '</div>',
          '</div>'
        ].join('');
      }).join('');

      function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
    });
  </script>
</body>
</html>
